services:
  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - observability
      - shared

  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:?GF_SECURITY_ADMIN_USER é obrigatória}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD é obrigatória}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Variáveis consumidas pelos arquivos de provisioning de datasources
      PG_HOST: ${PG_HOST:?PG_HOST é obrigatória}
      PG_PORT: ${PG_PORT:-5432}
      PG_DB: ${PG_DB:?PG_DB é obrigatória}
      PG_USER_RO: ${PG_USER_RO:?PG_USER_RO é obrigatória}
      PG_PASS_RO: ${PG_PASS_RO:?PG_PASS_RO é obrigatória}
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - observability
      - shared

volumes:
  prometheus_data:
  grafana_data:

networks:
  observability:
    driver: bridge
  # Network compartilhada com LavinMQ + Postgres no Coolify.
  # Em produção: editar para `external: true` e apontar para o network do projeto Coolify
  # que contém os serviços LavinMQ/Postgres. Em dev: criar manualmente ou ajustar.
  shared:
    driver: bridge
