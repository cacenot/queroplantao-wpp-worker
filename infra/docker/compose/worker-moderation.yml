# wpp-moderation-worker — consome wpp.moderation (moderate_group_message).
# Health server na porta 3012. Coolify aponta pra este compose ou diretamente
# pra infra/docker/worker-moderation.Dockerfile.
services:
  worker-moderation:
    build:
      context: ../../..
      dockerfile: infra/docker/worker-moderation.Dockerfile
    ports:
      - "3012:3012"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3012/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
