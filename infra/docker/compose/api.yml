# wpp-api — serviço HTTP. Coolify aponta pra este compose ou diretamente pra
# infra/docker/api.Dockerfile.
services:
  api:
    build:
      context: ../../..
      dockerfile: infra/docker/api.Dockerfile
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
