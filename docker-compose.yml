services:
  lavinmq:
    image: cloudamqp/lavinmq:latest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - lavinmq_data:/var/lib/lavinmq

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  lavinmq_data:
  redis_data:
